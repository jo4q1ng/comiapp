<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <title>ComiAPP</title>
</head>
<body>

    <header>
        <div class="header-top">
            <div>
            <h1>🥗 ComiAPP</h1>
            <p class="fecha" id="fecha-hoy"></p>
            </div>
            <button class="btn-creatina" onclick="abrirConfigCreatina()" id="btn-creatina-header">
            💊 Creatina
            </button>
        </div>
    </header>
    
    <!-- Modal recordatorio creatina -->
    <div id="modal-creatina" class="modal-overlay oculto">
        <div class="modal-box">
            <p class="modal-titulo">💊 Recordatorio de creatina</p>
            <label style="font-size:0.85rem;color:#374151;display:block;margin-bottom:0.4rem">¿A qué hora quieres que te recuerde?</label>
            <input type="time" id="hora-creatina" />
            <button onclick="guardarRecordatorioCreatina()" style="margin-top:0.75rem">Guardar hora</button>
            <button onclick="cerrarModalCreatina()" class="btn-cancelar" style="margin-top:0.5rem">Cancelar</button>
        </div>
    </div>

  <main>
    <!-- Resumen del día -->
    <section class="resumen">
      <div class="macro">
        <span class="valor" id="total-calorias">0</span>
        <span class="label">kcal</span>
      </div>
      <div class="macro">
        <span class="valor" id="total-proteinas">0g</span>
        <span class="label">proteínas</span>
      </div>
      <div class="macro">
        <span class="valor" id="total-carbos">0g</span>
        <span class="label">carbos</span>
      </div>
      <div class="macro">
        <span class="valor" id="total-grasas">0g</span>
        <span class="label">grasas</span>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab activo" onclick="mostrarTab('buscar')">🔍 Buscar</button>
      <button class="tab" onclick="mostrarTab('barras')">📷 Código de barras</button>
      <button class="tab" onclick="mostrarTab('manual')">✏️ Manual</button>
    </div>

    <!-- Tab: Buscar -->
    <section class="tab-content" id="tab-buscar">
      <div class="formulario">
        <input type="text" id="buscador" placeholder="Ej: pollo, arroz, manzana..." oninput="buscarAlimento()" />
        <div id="resultados-busqueda"></div>
      </div>
    </section>

    <!-- Tab: Código de barras -->
    <section class="tab-content oculto" id="tab-barras">
        <div class="formulario">

            <!-- Escáner código de barras manual -->
            <p class="estado-texto" style="margin-bottom:0.75rem">Ingresa el número bajo el código de barras</p>
            <input type="number" id="input-barras" placeholder="Ej: 7802800012345" />
            <button onclick="buscarManualBarras()">🔍 Buscar por código</button>

            <div class="separador">o</div>

            <!-- Escanear tabla nutricional -->
            <p class="estado-texto" style="margin-bottom:0.75rem">Fotografía la tabla nutricional del producto</p>
            <label class="btn-foto" for="input-tabla">📷 Escanear tabla nutricional</label>
            <input type="file" id="input-tabla" accept="image/*" capture="environment" onchange="escanearTabla(this)" style="display:none" />
            <p id="estado-escaner" class="estado-texto"></p>

        </div>
    </section>

    <!-- Tab: Manual -->
    <section class="tab-content oculto" id="tab-manual">
      <div class="formulario">
        <input type="text" id="nombre" placeholder="Nombre del alimento" />
        <input type="number" id="calorias" placeholder="Calorías (kcal)" />
        <div class="fila-macros">
          <input type="number" id="proteinas" placeholder="Proteínas (g)" />
          <input type="number" id="carbos" placeholder="Carbos (g)" />
          <input type="number" id="grasas" placeholder="Grasas (g)" />
        </div>
        <button onclick="agregarManual()">+ Agregar</button>
      </div>
    </section>

    <!-- Confirmación de alimento encontrado -->
    <section id="confirmar-panel" class="oculto formulario confirmacion">
        <p class="confirmar-titulo">¿Agregar este alimento?</p>
        <div id="confirmar-info"></div>
        <div class="gramos-container" id="gramos-container">
            <label style="font-size:0.85rem;color:#374151;margin-bottom:0.25rem;display:block">¿Cuántos gramos vas a comer?</label>
            <input type="number" id="input-gramos" placeholder="Ej: 150" oninput="actualizarCalculo()" />
            <div id="calculo-resultado" class="calculo-box"></div>
        </div>
        <div class="fila-botones">
            <button onclick="confirmarAlimento()">✓ Confirmar</button>
            <button onclick="cancelarConfirmacion()" class="btn-cancelar">Cancelar</button>
        </div>
    </section>

    <!-- Lista del día -->
    <section class="lista">
      <h2>Registro de hoy</h2>
      <ul id="lista-alimentos"></ul>
    </section>
    
    <p class="leyenda">P = Proteínas &nbsp;·&nbsp; C = Carbohidratos &nbsp;·&nbsp; G = Grasas</p>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.9.15/dist/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@undecaf/barcode-detector-polyfill@0.9.21/dist/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="js/app.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
