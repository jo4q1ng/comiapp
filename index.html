<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <title>ComiAPP</title>
</head>
<body>

  <header>
    <h1>🥗 ComiAPP</h1>
    <p class="fecha" id="fecha-hoy"></p>
  </header>

  <main>
    <!-- Resumen del día -->
    <section class="resumen">
      <div class="macro">
        <span class="valor" id="total-calorias">0</span>
        <span class="label">kcal</span>
      </div>
      <div class="macro">
        <span class="valor" id="total-proteinas">0g</span>
        <span class="label">proteínas</span>
      </div>
      <div class="macro">
        <span class="valor" id="total-carbos">0g</span>
        <span class="label">carbos</span>
      </div>
      <div class="macro">
        <span class="valor" id="total-grasas">0g</span>
        <span class="label">grasas</span>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab activo" onclick="mostrarTab('buscar')">🔍 Buscar</button>
      <button class="tab" onclick="mostrarTab('barras')">📷 Código de barras</button>
      <button class="tab" onclick="mostrarTab('manual')">✏️ Manual</button>
    </div>

    <!-- Tab: Buscar -->
    <section class="tab-content" id="tab-buscar">
      <div class="formulario">
        <input type="text" id="buscador" placeholder="Ej: pollo, arroz, manzana..." oninput="buscarAlimento()" />
        <div id="resultados-busqueda"></div>
      </div>
    </section>

    <!-- Tab: Código de barras -->
    <section class="tab-content oculto" id="tab-barras">
      <div class="formulario">
        <button onclick="toggleEscaner()">📷 Abrir cámara</button>
        <div id="escaner-container" class="oculto">
          <div id="escaner"></div>
          <button onclick="detenerEscaner()" class="btn-cancelar">Cancelar</button>
        </div>
        <p id="estado-escaner" class="estado-texto"></p>
      </div>
    </section>

    <!-- Tab: Manual -->
    <section class="tab-content oculto" id="tab-manual">
      <div class="formulario">
        <input type="text" id="nombre" placeholder="Nombre del alimento" />
        <input type="number" id="calorias" placeholder="Calorías (kcal)" />
        <div class="fila-macros">
          <input type="number" id="proteinas" placeholder="Proteínas (g)" />
          <input type="number" id="carbos" placeholder="Carbos (g)" />
          <input type="number" id="grasas" placeholder="Grasas (g)" />
        </div>
        <button onclick="agregarManual()">+ Agregar</button>
      </div>
    </section>

    <!-- Confirmación de alimento encontrado -->
    <section id="confirmar-panel" class="oculto formulario confirmacion">
      <p class="confirmar-titulo">¿Agregar este alimento?</p>
      <div id="confirmar-info"></div>
      <div class="fila-botones">
        <button onclick="confirmarAlimento()">✓ Confirmar</button>
        <button onclick="cancelarConfirmacion()" class="btn-cancelar">Cancelar</button>
      </div>
    </section>

    <!-- Lista del día -->
    <section class="lista">
      <h2>Registro de hoy</h2>
      <ul id="lista-alimentos"></ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="js/app.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
